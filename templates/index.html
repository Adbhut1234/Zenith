<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: rgba(31, 40, 51, 0.6);
            --accent-color: #66fcf1;
            --accent-glow: rgba(102, 252, 241, 0.4);
            --text-main: #c5c6c7;
            --text-heading: #ffffff;
            --border-color: rgba(102, 252, 241, 0.2);
            --input-bg: rgba(11, 12, 16, 0.8);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(102, 252, 241, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(102, 252, 241, 0.08) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .grid-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(102, 252, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(102, 252, 241, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            perspective: 500px;
            transform-origin: center center;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% { transform: translateY(0); }
            100% { transform: translateY(30px); }
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            box-sizing: border-box;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            color: var(--text-heading);
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 4px;
            margin: 0 0 10px 0;
            text-shadow: 0 0 15px var(--accent-glow);
            text-transform: uppercase;
        }

        .header p {
            font-size: 1rem;
            color: var(--accent-color);
            letter-spacing: 1px;
            margin: 0;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(102, 252, 241, 0.02);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-panel:hover {
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.7), inset 0 0 30px rgba(102, 252, 241, 0.05);
        }

        .section-title {
            font-size: 1.2rem;
            color: var(--text-heading);
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-color);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        input[type="text"],
        input[type="password"],
        textarea {
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.8rem 1rem;
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-glow);
            background: rgba(11, 12, 16, 0.95);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-container {
            display: flex;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        button {
            background: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 15px transparent;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(102, 252, 241, 0.2), transparent);
            transition: all 0.5s ease;
        }

        button:hover {
            background: rgba(102, 252, 241, 0.1);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0);
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(102, 252, 241, 0.9);
            color: #0b0c10;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .glass-panel {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    
    <div class="container">
        <div class="header">
            <h1>Zenith</h1>
            <p>SYSTEM CONFIGURATION & IDENTITY OVERRIDE</p>
        </div>

        <div class="glass-panel">
            <form id="configForm">
                
                <div class="section-title">Identity & Personalization</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="Zenith_USER_ID">User Alias (Name)</label>
                        <input type="text" id="Zenith_USER_ID" name="Zenith_USER_ID" placeholder="e.g. Tony Stark" value="{{ config.get('Zenith_USER_ID', '') }}">
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="USER_PERSONAL_INFO">Personal Background (AI Context)</label>
                        <textarea id="USER_PERSONAL_INFO" name="USER_PERSONAL_INFO" placeholder="Tell Zenith about yourself, your preferences, and context for conversations...">{{ config.get('USER_PERSONAL_INFO', '') }}</textarea>
                    </div>
                </div>

                <div class="section-title">Core API Keys</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="GOOGLE_API_KEY">Google Gemini API Key</label>
                        <input type="password" id="GOOGLE_API_KEY" name="GOOGLE_API_KEY" value="{{ config.get('GOOGLE_API_KEY', '') }}">
                    </div>
                    <div class="form-group">
                        <label for="MEM0_API_KEY">Mem0 API Key</label>
                        <input type="password" id="MEM0_API_KEY" name="MEM0_API_KEY" value="{{ config.get('MEM0_API_KEY', '') }}">
                    </div>
                </div>

                <div class="section-title">LiveKit Infrastructure</div>
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="LIVEKIT_URL">LiveKit Server URL</label>
                        <input type="text" id="LIVEKIT_URL" name="LIVEKIT_URL" value="{{ config.get('LIVEKIT_URL', '') }}">
                    </div>
                    <div class="form-group">
                        <label for="LIVEKIT_API_KEY">LiveKit API Key</label>
                        <input type="password" id="LIVEKIT_API_KEY" name="LIVEKIT_API_KEY" value="{{ config.get('LIVEKIT_API_KEY', '') }}">
                    </div>
                    <div class="form-group">
                        <label for="LIVEKIT_API_SECRET">LiveKit API Secret</label>
                        <input type="password" id="LIVEKIT_API_SECRET" name="LIVEKIT_API_SECRET" value="{{ config.get('LIVEKIT_API_SECRET', '') }}">
                    </div>
                </div>
                
                <div class="section-title">Communications Protocol (Email)</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="GMAIL_USER">Gmail Address</label>
                        <input type="text" id="GMAIL_USER" name="GMAIL_USER" value="{{ config.get('GMAIL_USER', '') }}">
                    </div>
                    <div class="form-group">
                        <label for="GMAIL_APP_PASSWORD">App Password</label>
                        <input type="password" id="GMAIL_APP_PASSWORD" name="GMAIL_APP_PASSWORD" value="{{ config.get('GMAIL_APP_PASSWORD', '') }}">
                    </div>
                </div>

                <div class="btn-container">
                    <button type="submit" id="saveBtn">Initialize Parameters</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast">Settings Saved Successfully</div>

    <script>
        document.getElementById('configForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('saveBtn');
            const originalText = btn.innerText;
            btn.innerText = 'PROCESSING...';
            btn.style.opacity = '0.7';

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/api/save', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    showToast(result.message);
                }
            } catch (error) {
                console.error('Error saving settings:', error);
                showToast('System Error: Could not save settings');
                document.getElementById('toast').style.background = '#ff4b4b';
                document.getElementById('toast').style.color = '#fff';
            } finally {
                btn.innerText = originalText;
                btn.style.opacity = '1';
            }
        });

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    toast.style.background = '';
                    toast.style.color = '';
                }, 400);
            }, 3000);
        }
    </script>
</body>
</html>
