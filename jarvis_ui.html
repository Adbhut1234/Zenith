<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS UI (Apple Intelligence Style)</title>
  <style>
    /* Core frameless window requirements */
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background: transparent;
      /* MUST be transparent for PyWebView/Tauri */
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Wrapper to perfectly center the UI in the smaller overlay window */
    .window-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      /* Let clicks pass through the transparent background */
    }

    /* Main JARVIS Pill Container */
    #jarvis-container {
      position: relative;
      width: 450px;
      height: 80px;
      pointer-events: auto;
      /* Enable clicks on the actual bar */
      transition: all 0.6s cubic-bezier(0.25, 1, 0.3, 1);
      transform-origin: center top;
    }

    /* --- Interaction States --- */

    /* 1. Idle State */
    #jarvis-container.idle {
      opacity: 0;
      transform: translateY(-40px) scale(0.85);
      /* Hide upwards */
      pointer-events: none;
    }

    #jarvis-container.idle .glow-blur,
    #jarvis-container.idle .glow-base {
      opacity: 0;
    }

    /* 2. Listening State */
    #jarvis-container.listening {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* 3. Speaking/Processing State */
    #jarvis-container.speaking {
      opacity: 1;
      transform: translateY(0) scale(1.03);
      /* Subtle scale up */
    }

    /* --- The Animated Siri Glow (Outer Wrappers) --- */

    /* 
           We use two wrappers for the glow: 
           - glow-base: provides the sharp colored border right at the edge
           - glow-blur: provides the soft aura spilling outside the pill
        */
    .glow-base,
    .glow-blur {
      position: absolute;
      inset: -3px;
      /* Extends 3px outside the inner glass bar */
      border-radius: 43px;
      /* 80/2 + 3px to maintain perfect pill shape */
      overflow: hidden;
      /* Clips the spinning gradient to the pill shape */
      transition: all 0.6s cubic-bezier(0.25, 1, 0.3, 1);
      mask-image: -webkit-radial-gradient(white, black);
      /* Safari border-radius overflow fix */
    }

    .glow-blur {
      filter: blur(15px);
      /* Heavily blurs the pill shape, creating the aura */
      opacity: 0.75;
      z-index: 1;
    }

    .glow-base {
      z-index: 2;
      opacity: 1;
    }

    /* The liquid flowing conic gradient */
    .gradient-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 600px;
      /* Large enough to cover the pill while spinning */
      height: 600px;
      margin-top: -300px;
      margin-left: -300px;
      /* Apple's palette: purple, light pink, coral, blue, and back to purple */
      background: conic-gradient(from 0deg,
          #8e2de2 0%,
          /* Purple */
          #ffb6c1 25%,
          /* Light Pink */
          #ff7f50 50%,
          /* Coral */
          #00c6ff 75%,
          /* Blue */
          #8e2de2 100%
          /* Purple (seamless loop) */
        );
      animation: spin 4s linear infinite;
    }

    /* Speaking State: dynamic glow changes */
    #jarvis-container.speaking .glow-blur {
      filter: blur(25px);
      /* Glow expands */
      opacity: 1;
      /* Brightens */
      inset: -5px;
      border-radius: 45px;
    }

    #jarvis-container.speaking .gradient-bg {
      animation: spin 1.5s linear infinite;
      /* Spins faster */
    }

    /* --- The Glassmorphism Inner Bar --- */
    .glass-bar {
      position: absolute;
      inset: 0;
      border-radius: 40px;
      /* Pill shape */
      background: rgba(30, 30, 30, 0.4);
      /* Dark translucent background */
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15),
        /* Subtle inner white border */
        0 10px 30px rgba(0, 0, 0, 0.2);
      /* Soft shadow on the desk */
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* --- Content & Text Inside the Bar --- */
    .content {
      z-index: 11;
      color: rgba(255, 255, 255, 0.95);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s ease;
    }

    .icon-container {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Pulse animation for Listening state */
    @keyframes pulse {
      0% {
        transform: scale(0.95);
        opacity: 0.7;
      }

      50% {
        transform: scale(1.02);
        opacity: 1;
      }

      100% {
        transform: scale(0.95);
        opacity: 0.7;
      }
    }

    #jarvis-container.listening .content {
      animation: pulse 2.5s ease-in-out infinite;
    }

    /* Solid glow for Speaking state */
    #jarvis-container.speaking .content {
      animation: none;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.6);
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* =========================================
           No extra controls, pure transparent UI
           ========================================= */
  </style>
</head>

<body>



  <!-- Main JARVIS UI -->
  <div class="window-wrapper">
    <div id="jarvis-container" class="idle">

      <!-- Soft Outer Glow (Spills outside) -->
      <div class="glow-blur">
        <div class="gradient-bg"></div>
      </div>

      <!-- Sharp Inner Edge Glow -->
      <div class="glow-base">
        <div class="gradient-bg"></div>
      </div>

      <!-- Heavy Frosted Glass Bar -->
      <div class="glass-bar">
        <div class="content" id="jarvis-text">
          <!-- Content injected via JavaScript -->
        </div>
      </div>
    </div>
  </div>

  <script>
    const container = document.getElementById('jarvis-container');
    const textContainer = document.getElementById('jarvis-text');

    // SVG Icons
    const iconMic = `
            <svg class="icon-container" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="22"></line>
            </svg>`;

    const iconWave = `
            <svg class="icon-container" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12h4l3-9 5 18 3-9h5"></path>
            </svg>`;

    // Function to toggle between states
    function setState(state) {
      let customText = null;
      if (state.startsWith('custom:')) {
        customText = state.substring(7);
        state = 'speaking';
      }

      // Remove previous states
      container.classList.remove('idle', 'listening', 'speaking', 'waiting');

      // Apply new state class
      if (state === 'waiting') {
        container.classList.add('listening'); // Use listening's soft pulse
      } else {
        container.classList.add(state);
      }

      // Update content based on state
      if (customText) {
        textContainer.innerHTML = customText;
        textContainer.style.opacity = '1';
      } else if (state === 'idle') {
        textContainer.innerHTML = 'JARVIS';
        textContainer.style.opacity = '0.5';
      } else if (state === 'listening') {
        textContainer.innerHTML = `${iconMic} JARVIS is listening...`;
        textContainer.style.opacity = '1';
      } else if (state === 'speaking') {
        textContainer.innerHTML = `${iconWave} Processing...`;
        textContainer.style.opacity = '1';
      } else if (state === 'waiting') {
        textContainer.innerHTML = `Waiting for command...`;
        textContainer.style.opacity = '1';
      }
    }

    // Initialization
    window.onload = () => {
      // Show the UI briefly on boot to confirm it loaded
      setState('speaking');
      setTimeout(() => {
        setState('idle');
      }, 3000);
    };
  </script>
</body>

</html>
