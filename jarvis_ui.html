<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zenith</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      pointer-events: none;
    }

    /* ── Aurora blob animations ──────────────────── */
    @keyframes b1   { 0%,100%{left:-20px} 50%{left:190px} }
    @keyframes b2   { 0%,100%{right:-20px} 50%{right:170px} }
    @keyframes b3   { 0%,100%{left:42%;transform:translate(-50%,-50%) scale(1)}
                      50%{left:52%;transform:translate(-50%,-50%) scale(1.3)} }

    /* ── Orb animations ──────────────────────────── */
    @keyframes ohue {
      to { filter: hue-rotate(360deg) blur(0.5px) brightness(1.22); }
    }
    @keyframes omorph {
      0%,100% { border-radius:50%;           transform:scale(1);    }
      25%     { border-radius:60% 40% 55% 45%; transform:scale(1.07); }
      50%     { border-radius:40% 60% 45% 55%; transform:scale(0.93); }
      75%     { border-radius:55% 45% 60% 40%; transform:scale(1.04); }
    }

    /* ── Traveling wave bars ─────────────────────── */
    @keyframes tw {
      0%,100% { height: 4px;      opacity: 0.28; }
      50%     { height: var(--wh); opacity: 1;    }
    }
    .wb {
      width: 3px;
      border-radius: 2px;
      animation: tw var(--ws, 1.4s) ease-in-out infinite;
      transform-origin: bottom;
    }
    .wb:nth-child(1)  { --wh:16px; animation-delay:0s;    }
    .wb:nth-child(2)  { --wh:24px; animation-delay:.13s;  }
    .wb:nth-child(3)  { --wh:30px; animation-delay:.26s;  }
    .wb:nth-child(4)  { --wh:36px; animation-delay:.39s;  }
    .wb:nth-child(5)  { --wh:40px; animation-delay:.52s;  }
    .wb:nth-child(6)  { --wh:36px; animation-delay:.65s;  }
    .wb:nth-child(7)  { --wh:30px; animation-delay:.78s;  }
    .wb:nth-child(8)  { --wh:24px; animation-delay:.91s;  }
    .wb:nth-child(9)  { --wh:18px; animation-delay:1.04s; }
    .wb:nth-child(10) { --wh:12px; animation-delay:1.17s; }
    .wb:nth-child(11) { --wh:16px; animation-delay:1.3s;  }

    /* ── Spinner for thinking state ──────────────── */
    @keyframes dring { to { transform: rotate(360deg); } }
    .spinner {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.18);
      border-top-color: rgba(255,255,255,0.85);
      animation: dring 0.75s linear infinite;
    }

    /* ── Pill ────────────────────────────────────── */
    #zenith-bar {
      position: absolute;
      top: 5px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #amb {
      position: absolute;
      width: 460px; height: 58px;
      border-radius: 50%;
      filter: blur(38px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      background: transparent;
      transition: background 0.8s ease, opacity 0.6s ease;
      z-index: 0;
    }

    #pill {
      position: relative;
      z-index: 1;
      width: 488px; height: 70px;
      border-radius: 35px;
      overflow: hidden;
      pointer-events: auto;
      transition:
        opacity   0.55s cubic-bezier(0.16,1,0.3,1),
        transform 0.55s cubic-bezier(0.16,1,0.3,1),
        box-shadow 0.75s ease;
    }

    #pill.off {
      opacity: 0;
      transform: translateY(-16px) scale(0.91);
      pointer-events: none;
    }

    /* Aurora blob layers */
    .ablob {
      position: absolute;
      border-radius: 50%;
      filter: blur(25px);
      top: 50%;
      transition: background 0.8s ease;
    }
    #a1 { width:230px; height:110px; transform:translateY(-50%); animation:b1 3.5s ease-in-out infinite; }
    #a2 { width:190px; height: 95px; transform:translateY(-50%); animation:b2 4.2s ease-in-out infinite; }
    #a3 { width:160px; height: 85px; animation:b3 3.1s ease-in-out infinite; }

    /* Dark glass overlay over aurora */
    #glass {
      position: absolute;
      inset: 0;
      background: rgba(4, 5, 12, 0.76);
      border-radius: inherit;
    }
    #border-ring {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 0.75px solid rgba(255,255,255,0.11);
    }
    #top-light {
      position: absolute;
      top: 0; left: 22px; right: 22px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
    }

    /* Content */
    #content {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      height: 100%;
      padding: 0 17px 0 15px;
      gap: 13px;
    }

    #left-slot {
      width: 42px; height: 42px;
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #orb {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #4285F4, #9C27B0, #00BCD4, #4285F4);
      animation: ohue 7s linear infinite, omorph 5s ease-in-out infinite;
      filter: blur(0.5px) brightness(1.22);
      position: absolute;
    }

    #wv {
      display: none;
      align-items: flex-end;
      gap: 3px;
      height: 38px;
      width: 42px;
      justify-content: center;
      position: absolute;
      inset: 0;
    }

    #text-area {
      flex: 1;
      overflow: hidden;
      min-width: 0;
    }
    #pst {
      color: rgba(255,255,255,0.93);
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #psb {
      color: rgba(255,255,255,0.35);
      font-size: 12px;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.1px;
      min-height: 15px;
    }

    #pbg {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      border: 0.5px solid rgba(255,255,255,0.10);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }
  </style>
</head>
<body oncontextmenu="return false;">

  <div id="zenith-bar">
    <div id="amb"></div>

    <div id="pill" class="off">
      <div id="a1" class="ablob"></div>
      <div id="a2" class="ablob"></div>
      <div id="a3" class="ablob"></div>

      <div id="glass"></div>
      <div id="border-ring"></div>
      <div id="top-light"></div>

      <div id="content">
        <div id="left-slot">
          <div id="orb"></div>
          <div id="wv">
            <div class="wb"></div><div class="wb"></div><div class="wb"></div>
            <div class="wb"></div><div class="wb"></div><div class="wb"></div>
            <div class="wb"></div><div class="wb"></div><div class="wb"></div>
            <div class="wb"></div><div class="wb"></div>
          </div>
        </div>

        <div id="text-area">
          <div id="pst"></div>
          <div id="psb"></div>
        </div>

        <div id="pbg"></div>
      </div>
    </div>
  </div>

  <script>
    // ── State definitions ────────────────────────────────────────────────────
    const STATES = {
      hidden: {
        c1:'transparent', c2:'transparent', c3:'transparent',
        glow:'transparent', sh:'none',
        status:'', sub:'',
        wave:false, ba1:4, ba2:5, ba3:3.5,
        ws:'1.1s', wc1:'#555', wc2:'#333', ri:'mic'
      },
      listening: {
        c1:'rgba(66,133,244,.92)', c2:'rgba(0,150,200,.82)', c3:'rgba(103,58,183,.72)',
        glow:'rgba(66,133,244,.28)',
        sh:'0 0 60px rgba(66,133,244,.42),0 0 130px rgba(66,133,244,.14)',
        status:'Listening\u2026', sub:'Speak now',
        wave:true, ba1:3.5, ba2:4.2, ba3:3.1,
        ws:'1.0s', wc1:'#4285F4', wc2:'#00BCD4', ri:'mic'
      },
      thinking: {
        c1:'rgba(124,58,237,.92)', c2:'rgba(219,39,119,.82)', c3:'rgba(245,158,11,.72)',
        glow:'rgba(124,58,237,.28)',
        sh:'0 0 60px rgba(124,58,237,.42),0 0 130px rgba(124,58,237,.14)',
        status:'Thinking\u2026', sub:'Processing your request',
        wave:false, ba1:1.4, ba2:1.8, ba3:1.2,
        ws:'1.1s', wc1:'#7C3AED', wc2:'#EC4899', ri:'spin'
      },
      speaking: {
        c1:'rgba(219,39,119,.92)', c2:'rgba(109,40,217,.82)', c3:'rgba(37,99,235,.72)',
        glow:'rgba(219,39,119,.28)',
        sh:'0 0 60px rgba(219,39,119,.42),0 0 130px rgba(109,40,217,.18)',
        status:'Speaking', sub:'',
        wave:true, ba1:2.8, ba2:3.4, ba3:2.2,
        ws:'0.72s', wc1:'#DB2777', wc2:'#6D28D9', ri:'wave'
      },
      waiting: {
        c1:'rgba(75,85,99,.7)', c2:'rgba(55,65,81,.65)', c3:'rgba(107,114,128,.6)',
        glow:'rgba(255,255,255,.04)',
        sh:'0 0 30px rgba(255,255,255,.06)',
        status:'Standing by\u2026', sub:'',
        wave:false, ba1:7, ba2:8.5, ba3:6,
        ws:'1.6s', wc1:'#6B7280', wc2:'#4B5563', ri:'pause'
      },
      tool: {
        c1:'rgba(5,150,105,.92)', c2:'rgba(2,132,199,.82)', c3:'rgba(124,58,237,.72)',
        glow:'rgba(5,150,105,.28)',
        sh:'0 0 60px rgba(5,150,105,.42),0 0 130px rgba(5,150,105,.14)',
        status:'Running tool', sub:'',
        wave:false, ba1:3.0, ba2:3.8, ba3:2.5,
        ws:'1.1s', wc1:'#059669', wc2:'#0284C7', ri:'gear'
      }
    };

    // ── SVG icon strings ─────────────────────────────────────────────────────
    const ICONS = {
      mic: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="rgba(255,255,255,.55)" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
            </svg>`,
      wave:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="rgba(255,255,255,.55)" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12h3l2-7 3 14 3-10 2 6 2-3h5"/>
            </svg>`,
      gear:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none"
               stroke="rgba(255,255,255,.55)" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0
                       1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33
                       1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                       A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0
                       0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06
                       A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0
                       0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0
                       0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06
                       a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0
                       0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0
                       1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65
                       0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                       l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65
                       0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                       a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>`,
      pause:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                stroke="rgba(255,255,255,.55)" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
               <circle cx="12" cy="12" r="10"/>
               <line x1="10" y1="15" x2="10" y2="9"/>
               <line x1="14" y1="15" x2="14" y2="9"/>
             </svg>`
    };

    // ── DOM references ────────────────────────────────────────────────────────
    const $pill = document.getElementById('pill');
    const $a1   = document.getElementById('a1');
    const $a2   = document.getElementById('a2');
    const $a3   = document.getElementById('a3');
    const $orb  = document.getElementById('orb');
    const $wv   = document.getElementById('wv');
    const $pst  = document.getElementById('pst');
    const $psb  = document.getElementById('psb');
    const $pbg  = document.getElementById('pbg');
    const $amb  = document.getElementById('amb');

    // ── Main state function — called by Python via runJavaScript ─────────────
    function go(name) {
      const s = STATES[name] || STATES.hidden;

      // Pill visibility
      $pill.classList.toggle('off', name === 'hidden');
      $pill.style.boxShadow = s.sh;

      // Aurora blobs
      $a1.style.background = s.c1; $a1.style.animationDuration = s.ba1 + 's';
      $a2.style.background = s.c2; $a2.style.animationDuration = s.ba2 + 's';
      $a3.style.background = s.c3; $a3.style.animationDuration = s.ba3 + 's';

      // Orb vs traveling wave
      $orb.style.display = s.wave ? 'none' : 'block';
      $wv.style.display  = s.wave ? 'flex'  : 'none';
      document.querySelectorAll('.wb').forEach(b => {
        b.style.background = 'linear-gradient(to top,' + s.wc1 + ',' + s.wc2 + ')';
        b.style.animationDuration = s.ws;
      });

      // Text
      $pst.textContent = s.status;
      $psb.textContent = s.sub;

      // Ambient glow
      $amb.style.background = s.glow;
      $amb.style.opacity = (name === 'hidden') ? '0' : '1';

      // Badge icon
      if (s.ri === 'spin') {
        $pbg.innerHTML = '<div class="spinner"></div>';
      } else {
        $pbg.innerHTML = ICONS[s.ri] || ICONS.mic;
      }
    }

    // ── Tool status text — called by Python for tool activity ────────────────
    function setCustomText(text) {
      go('tool');
      $psb.textContent = text;
    }

    // ── setState alias — zenith_overlay.py calls setState() ─────────────────
    function setState(state) {
      if (state.startsWith('custom:')) {
        setCustomText(state.substring(7));
      } else if (state === 'idle') {
        go('hidden');
      } else {
        go(state);
      }
    }

    // Start hidden — Python drives the first state on loadFinished
    go('hidden');
  </script>

</body>
</html>
