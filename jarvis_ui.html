<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  background:transparent;
  overflow:hidden;
}
.wrap{
  height:100vh;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
}

.jw{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
}
.ambient{width:480px;height:70px;border-radius:50%;filter:blur(35px);transition:background 0.7s ease,opacity 0.5s;opacity:0;pointer-events:none;margin-bottom:-20px}

.pill{position:relative;width:500px;height:74px;border-radius:37px;overflow:hidden;transition:opacity 0.55s cubic-bezier(0.16,1,0.3,1),transform 0.55s cubic-bezier(0.16,1,0.3,1),box-shadow 0.7s ease;box-shadow:0 0 0 transparent}
.pill.off{opacity:0;transform:translateY(-14px) scale(0.94);pointer-events:none}

.grad-ring{position:absolute;top:50%;left:50%;width:750px;height:750px;margin:-375px 0 0 -375px;background:conic-gradient(from 0deg,#BF5AF2,#7977FF,#0A84FF,#00C6FF,#30D158,#FFD60A,#FF9F0A,#FF375F,#BF5AF2);animation:spin var(--gs,3.5s) linear infinite;border-radius:50%}
@keyframes spin{to{transform:rotate(360deg)}}

.glass{position:absolute;inset:1.5px;border-radius:35.5px;background:rgba(9,9,15,0.84);backdrop-filter:blur(40px) saturate(200%);-webkit-backdrop-filter:blur(40px) saturate(200%);border:0.5px solid rgba(255,255,255,0.09);display:flex;align-items:center;padding:0 16px 0 14px;gap:13px}

.orb-w{width:44px;height:44px;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center}
.orb{width:40px;height:40px;border-radius:50%;background:conic-gradient(from 0deg,#BF5AF2,#0A84FF,#30D158,#BF5AF2);animation:ohue var(--oa,8s) linear infinite,omorph var(--ob,5s) ease-in-out infinite;filter:blur(0.6px) brightness(1.25);transition:opacity 0.4s}
@keyframes ohue{to{filter:hue-rotate(360deg) blur(0.6px) brightness(1.25)}}
@keyframes omorph{0%,100%{border-radius:50%;transform:scale(1)}25%{border-radius:58% 42% 54% 46%;transform:scale(1.05)}50%{border-radius:42% 58% 46% 54%;transform:scale(0.96)}75%{border-radius:54% 46% 58% 42%;transform:scale(1.03)}}

.bars{display:none;align-items:flex-end;gap:3.5px;height:36px;width:44px;justify-content:center;flex-shrink:0}
.b{width:3.5px;border-radius:2px;background:linear-gradient(to top,var(--bc1,#0A84FF),var(--bc2,#BF5AF2));animation:bwave var(--bs,1.1s) ease-in-out infinite;transform-origin:bottom}
.b:nth-child(1){animation-delay:0s;--bh:18px}
.b:nth-child(2){animation-delay:.12s;--bh:26px}
.b:nth-child(3){animation-delay:.06s;--bh:22px}
.b:nth-child(4){animation-delay:.18s;--bh:30px}
.b:nth-child(5){animation-delay:.09s;--bh:24px}
.b:nth-child(6){animation-delay:.15s;--bh:20px}
.b:nth-child(7){animation-delay:.03s;--bh:16px}
@keyframes bwave{0%,100%{height:4px;opacity:0.4}50%{height:var(--bh);opacity:1}}

.txt{flex:1;overflow:hidden;min-width:0}
.st{color:rgba(255,255,255,0.93);font-size:16px;font-weight:500;letter-spacing:-0.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all 0.3s}
.sub{color:rgba(255,255,255,0.38);font-size:12px;font-weight:400;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all 0.3s;letter-spacing:0.1px}

.ri{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.07);border:0.5px solid rgba(255,255,255,0.1);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background 0.3s}
.ri svg{width:15px;height:15px;stroke:rgba(255,255,255,0.55);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}

.dot-ring{width:8px;height:8px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);border-top-color:rgba(255,255,255,0.8);animation:dotsp 0.8s linear infinite}
@keyframes dotsp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="jw">
    <div class="ambient" id="amb"></div>
    <div class="pill" id="pill">
      <div class="grad-ring" id="gr"></div>
      <div class="glass">
        <div class="orb-w">
          <div class="orb" id="orb"></div>
          <div class="bars" id="bars">
            <div class="b"></div><div class="b"></div><div class="b"></div>
            <div class="b"></div><div class="b"></div><div class="b"></div>
            <div class="b"></div>
          </div>
        </div>
        <div class="txt">
          <div class="st" id="st">JARVIS</div>
          <div class="sub" id="sub">Awaiting command...</div>
        </div>
        <div class="ri" id="ri">
          <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const S={
  idle:{st:'JARVIS',sub:'Awaiting command...',wave:false,gs:'4s',oa:'8s',ob:'5s',glow:'transparent',shadow:'none',ri:'mic',bc1:'#0A84FF',bc2:'#BF5AF2',bs:'1.1s'},
  listening:{st:'Listening\u2026',sub:'Speak now',wave:true,gs:'2s',oa:'8s',ob:'5s',glow:'rgba(10,132,255,0.22)',shadow:'0 0 50px rgba(10,132,255,0.35),0 0 100px rgba(10,132,255,0.12)',ri:'mic',bc1:'#0A84FF',bc2:'#30D158',bs:'0.9s'},
  waiting:{st:'Thinking\u2026',sub:'Processing your request',wave:false,gs:'1s',oa:'1.5s',ob:'2s',glow:'rgba(255,159,10,0.22)',shadow:'0 0 50px rgba(255,159,10,0.35),0 0 100px rgba(255,159,10,0.12)',ri:'spin',bc1:'#FF9F0A',bc2:'#FF375F',bs:'1.1s'},
  speaking:{st:'Speaking',sub:'Responding...',wave:true,gs:'1.5s',oa:'8s',ob:'5s',glow:'rgba(191,90,242,0.22)',shadow:'0 0 50px rgba(191,90,242,0.38),0 0 100px rgba(191,90,242,0.14)',ri:'wave',bc1:'#BF5AF2',bc2:'#FF375F',bs:'0.75s'},
  tool:{st:'Running tool',sub:'Executing...',wave:false,gs:'3s',oa:'4s',ob:'4s',glow:'rgba(48,209,88,0.22)',shadow:'0 0 50px rgba(48,209,88,0.35),0 0 100px rgba(48,209,88,0.12)',ri:'gear',bc1:'#30D158',bc2:'#00C6FF',bs:'1.1s'}
};

const micSvg=`<svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`;
const waveSvg=`<svg viewBox="0 0 24 24"><path d="M2 12h3l2-7 3 14 3-10 2 6 2-3h5"/></svg>`;
const gearSvg=`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`;

function setState(stateStr) {
  let mode = stateStr;
  let customText = null;

  if (stateStr.startsWith('custom:')) {
    customText = stateStr.substring(7);
    mode = 'tool';
  }

  const isHidden = (mode === 'idle');
  const s = S[mode] || S['idle']; // Fallback

  const pill = document.getElementById('pill');
  const gr = document.getElementById('gr');
  const orb = document.getElementById('orb');
  const bars = document.getElementById('bars');
  const st = document.getElementById('st');
  const sub = document.getElementById('sub');
  const ri = document.getElementById('ri');
  const amb = document.getElementById('amb');

  pill.classList.toggle('off', isHidden);
  
  if(s) {
    gr.style.setProperty('--gs',s.gs);
    gr.style.animationDuration=s.gs;

    orb.style.display=s.wave?'none':'block';
    bars.style.display=s.wave?'flex':'none';
    orb.style.setProperty('--oa',s.oa);
    orb.style.setProperty('--ob',s.ob);
    orb.style.animationDuration=s.oa+','+s.ob;

    document.querySelectorAll('.b').forEach(b=>{
      b.style.setProperty('--bc1',s.bc1);
      b.style.setProperty('--bc2',s.bc2);
      b.style.setProperty('--bs',s.bs);
      b.style.animationDuration=s.bs;
    });

    st.textContent=s.st;
    sub.textContent = customText ? customText : s.sub;
    
    pill.style.boxShadow=s.shadow;
    amb.style.background=s.glow;
    amb.style.opacity=isHidden?'0':'1';

    if(s.ri==='spin'){
      ri.innerHTML=`<div class="dot-ring"></div>`;
    } else if(s.ri==='mic'){
      ri.innerHTML=micSvg;
    } else if(s.ri==='wave'){
      ri.innerHTML=waveSvg;
    } else if(s.ri==='gear'){
      ri.innerHTML=gearSvg;
    }
  }
}

// Initial state on boot to confirm it loaded
setState('tool');
setTimeout(() => {
    setState('idle');
}, 3000);

</script>
</body>
</html>
